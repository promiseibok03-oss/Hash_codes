<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Login & Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <!-- Login Form -->
            <div class="form-container active" id="loginForm">
                <div class="form-header">
                    <h1>Welcome Back</h1>
                    <p>Sign in to your account</p>
                </div>

                <form class="auth-form" id="login-form">
                    <div class="form-group">
                        <input 
                            type="email" 
                            id="login-email" 
                            class="input-field" 
                            placeholder=" " 
                            required
                        >
                        <label for="login-email" class="floating-label">Email Address</label>
                    </div>

                    <div class="form-group">
                        <input 
                            type="password" 
                            id="login-password" 
                            class="input-field" 
                            placeholder=" " 
                            required
                        >
                        <label for="login-password" class="floating-label">Password</label>
                    </div>

                    <div class="form-options">
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="submit-btn">Sign In</button>

                    <div class="form-divider">
                        <span>Don't have an account?</span>
                    </div>

                    <button type="button" class="toggle-btn" onclick="toggleForm()">Create Account</button>
                </form>

                <div class="message" id="login-message"></div>
            </div>

            <!-- Signup Form -->
            <div class="form-container" id="signupForm">
                <div class="form-header">
                    <h1>Join Us</h1>
                    <p>Create your account to get started</p>
                </div>

                <form class="auth-form" id="signup-form">
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="signup-username" 
                            class="input-field" 
                            placeholder=" " 
                            required
                        >
                        <label for="signup-username" class="floating-label">Username</label>
                    </div>

                    <div class="form-group">
                        <input 
                            type="email" 
                            id="signup-email" 
                            class="input-field" 
                            placeholder=" " 
                            required
                        >
                        <label for="signup-email" class="floating-label">Email Address</label>
                    </div>

                    <div class="form-group">
                        <input 
                            type="password" 
                            id="signup-password" 
                            class="input-field" 
                            placeholder=" " 
                            required
                        >
                        <label for="signup-password" class="floating-label">Password</label>
                    </div>

                    <div class="password-strength" id="password-strength">
                        <div class="strength-bar"></div>
                    </div>

                    <button type="submit" class="submit-btn">Create Account</button>

                    <div class="form-divider">
                        <span>Already have an account?</span>
                    </div>

                    <button type="button" class="toggle-btn" onclick="toggleForm()">Sign In</button>
                </form>

                <div class="message" id="signup-message"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
